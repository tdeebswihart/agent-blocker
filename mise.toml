[tools]
go = "1.26.0"
"golangci-lint" = "2.10.1"

[tasks.test]
description = "Run tests"
run = "go test ./..."

[tasks.fix]
description = "Run go fix on all packages"
run = "go fix ./..."

[tasks.format]
description = "Format code with golangci-lint"
depends = ["fix"]
run = "golangci-lint fmt ./..."

[tasks.lint]
description = "Lint and autofix with golangci-lint"
depends = ["format"]
run = "golangci-lint run --fix"

[tasks.update-flake-hashes]
description = "Update vendorHash in flake.nix by building and capturing the expected hash"
run = """
#!/usr/bin/env bash
set -euo pipefail

FLAKE="flake.nix"

# Capture the current vendor hash
old_hash=$(grep -oE 'vendorHash = "sha256-[^"]*"' "$FLAKE" | grep -oE 'sha256-[^"]+')

# Build in a temp copy to avoid modifying the real flake.nix
tmpdir=$(mktemp -d)
trap 'rm -rf "$tmpdir"' EXIT
cp -a . "$tmpdir/"
sed -i '' 's|vendorHash = "sha256-[^"]*";|vendorHash = "";|' "$tmpdir/$FLAKE"

if output=$(nix build "path:$tmpdir#" 2>&1); then
  echo "Build succeeded with empty hash — vendorHash may not be needed"
  exit 0
fi

hash=$(echo "$output" | grep -oE 'got:[[:space:]]+sha256-[A-Za-z0-9+/=]+' | awk '{print $2}')
if [ -z "$hash" ]; then
  echo "Failed to extract hash from nix build output:" >&2
  echo "$output" >&2
  exit 1
fi

# Exit quietly if unchanged
if [ "$hash" = "$old_hash" ]; then
  exit 0
fi

# Update the real flake.nix only when the hash changed
sed -i '' "s|vendorHash = \"$old_hash\";|vendorHash = \"$hash\";|" "$FLAKE"
echo "Updated vendorHash to $hash"
"""

[tasks.install]
description = "Build and install the binary into ~/.local/bin"
run = "go build -o ~/.local/bin/agent-blocker ./cmd/main.go"
